<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portinello Luxury Store - Premium Parfüm, Kosmetika və Zərgərlik">
    <title>Portinello Luxury | Premium Collection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --black: #0a0a0a;
            --white: #ffffff;
            --gray: #f4f4f4;
            --dark-gray: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--white);
            color: var(--black);
            line-height: 1.6;
        }

        /* Header & Navigation */
        header {
            background: var(--black);
            color: var(--gold);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--gold);
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .categories-nav {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .categories-nav button {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 20px;
            transition: 0.3s;
            white-space: nowrap;
        }

        .categories-nav button:hover, .categories-nav button.active {
            background: var(--gold);
            color: var(--black);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            padding: 40px 0;
        }

        .product-card {
            background: var(--white);
            border: 1px solid var(--gray);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background-color: var(--gray);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--gold);
        }

        .product-info {
            padding: 15px;
            text-align: center;
        }

        .product-info h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .price {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 15px;
        }

        .btn-buy {
            display: inline-block;
            background: var(--black);
            color: var(--gold);
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
        }

        .btn-buy:hover {
            background: var(--gold);
            color: var(--black);
        }

        /* Footer */
        footer {
            background: var(--black);
            color: var(--gray);
            padding: 40px 0;
            text-align: center;
            margin-top: 50px;
        }

        .social-links {
            margin-bottom: 20px;
        }

        .social-links a {
            color: var(--gold);
            font-size: 1.5rem;
            margin: 0 15px;
            text-decoration: none;
        }

        /* Floating WhatsApp */
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            z-index: 1000;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .products-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .product-image { height: 150px; font-size: 2rem; }
            .product-info h3 { font-size: 0.9rem; }
            .logo { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

            </div>
        </nav>
        <div class="categories-nav" id="categoryMenu">
            <button class="active" onclick="filterProducts('all')">Hamısı</button>
            <button onclick="filterProducts('parfüm')">Parfüm</button>
            <button onclick="filterProducts('kosmetika')">Kosmetika</button>
            <button onclick="filterProducts('zərgərlik')">Zərgərlik</button>

    </div>

<section class="hero">

</footer>

    function displayProducts(filteredProducts) {
        const display = document.getElementById('productDisplay');
        display.innerHTML = filteredProducts.map(p => `
            <div class="product-card">
                <div class="product-image" style="background-image: url('${p.image}'); background-size: cover; background-position: center; height: 250px;">
                </div>
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <p style="font-size: 0.85rem; color: #666; margin-bottom: 10px;">${p.description}</p>
                    <span class="price">${p.price} AZN</span>
                    <a href="https://wa.me/994997895969?text=Salam, *${p.name}* (${p.price} AZN) haqqında məlumat almaq və sifariş etmək istəyirəm." class="btn-buy" target="_blank">Sifariş Et</a>
                </div>
            </div>
        `).join('');
    }

    function filterProducts(cat) {
        const buttons = document.querySelectorAll('.categories-nav button');
        buttons.forEach(btn => btn.classList.remove('active'));
        
        if(cat === 'all') {
            displayProducts(products);
        } else {
            const filtered = products.filter(p => p.category === cat);
            displayProducts(filtered);
        }
    }

    displayProducts(products);
